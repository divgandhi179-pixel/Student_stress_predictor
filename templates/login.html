<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Stress Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    {% include 'navbar.html' %}
    <div class="theme-switch-wrapper">
        <label class="theme-switch" for="checkbox">
            <input type="checkbox" id="checkbox" />
            <div class="slider round"></div>
        </label>
        <span id="theme-icon" style="font-size: 0.8rem; font-weight: bold; margin-left: 5px;">DARK</span>
    </div>

    <!-- Background Orbs defined in CSS pseudo-elements -->
    <div class="mesh-orb"></div>

    <div class="container fade-in" style="max-width: 450px; padding: 3.5rem;">
        <header>
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-activity" style="color: var(--primary); margin: 0 auto 0.5rem auto; animation: float 3s ease-in-out infinite;"><path d="M22 12h-2.48a2 2 0 0 0-1.93 1.46l-2.35 8.36a.25.25 0 0 1-.48 0L9.24 2.18a.25.25 0 0 0-.48 0l-2.35 8.36A2 2 0 0 1 4.49 12H2"/></svg>
            <h1>Welcome Back</h1>
            <p>Ready for your daily check-in?</p>
        </header>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash-message">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('login') }}">
            <div class="input-group" style="margin-bottom: 1.5rem;">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter your username" required autocomplete="off">
            </div>
            <div class="input-group" style="margin-bottom: 2rem;">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="glow-button">
                <span>Sign In To Portal</span>
            </button>
        </form>
        <p style="text-align: center; margin-top: 2.5rem; color: var(--text-muted); font-size: 0.95rem;">
            Don't have an account? <a href="{{ url_for('signup') }}">Create Account</a>
        </p>
    </div>

    <script>
        const toggleSwitch = document.querySelector('.theme-switch input[type="checkbox"]');
        const themeIcon = document.getElementById('theme-icon');
        
        // Auto Dark Mode for Demo
        document.body.classList.add('dark-theme');
        toggleSwitch.checked = true;
        themeIcon.textContent = 'DARK';

        const currentTheme = localStorage.getItem('theme');
        if (currentTheme) {
            if (currentTheme === 'light') {
                document.body.classList.remove('dark-theme');
                toggleSwitch.checked = false;
                themeIcon.textContent = 'LIGHT';
            }
        }

        toggleSwitch.addEventListener('change', function(e) {
            if (e.target.checked) {
                document.body.classList.add('dark-theme');
                localStorage.setItem('theme', 'dark-theme');
                themeIcon.textContent = 'DARK';
            } else {
                document.body.classList.remove('dark-theme');
                localStorage.setItem('theme', 'light');
                themeIcon.textContent = 'LIGHT';
            }    
        });

        // Floating animation for logo
        const keyframes = `
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }`;
        const styleSheet = document.createElement("style");
        styleSheet.innerText = keyframes;
        document.head.appendChild(styleSheet);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - AI Stress Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Theme Switcher -->
    <div class="theme-switch-wrapper">
        <label class="theme-switch" for="checkbox">
            <input type="checkbox" id="checkbox" />
            <div class="slider round"></div>
        </label>
        <span id="theme-icon">☀️</span>
    </div>
    <div class="container" style="max-width: 450px; padding: 40px;">
        <header>
            <h2>Create Account 🚀</h2>
            <p>Join to track your well-being easily.</p>
        </header>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div style="background: rgba(255, 71, 87, 0.2); padding: 10px; border-radius: 8px; margin-bottom: 20px; color: #ff4757; text-align: center;">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('signup') }}">
            <div class="input-group">
                <label>Choose a Username</label>
                <input type="text" name="username" required autocomplete="off">
            </div>
            <div class="input-group">
                <label>Choose a Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="glow-button" style="margin-top: 20px;">
                <span>Sign Up</span>
            </button>
        </form>
        <p style="text-align: center; margin-top: 20px; color: var(--text-muted);">Already have an account? <a href="{{ url_for('login') }}" style="color: var(--primary); font-weight: 600;">Login</a></p>
    </div>

    <script>
        const toggleSwitch = document.querySelector('.theme-switch input[type="checkbox"]');
        const themeIcon = document.getElementById('theme-icon');
        const currentTheme = localStorage.getItem('theme');

        if (currentTheme) {
            document.body.classList.add(currentTheme);
            if (currentTheme === 'dark-theme') {
                toggleSwitch.checked = true;
                themeIcon.textContent = '🌙';
            }
        }

        toggleSwitch.addEventListener('change', function(e) {
            if (e.target.checked) {
                document.body.classList.add('dark-theme');
                localStorage.setItem('theme', 'dark-theme');
                themeIcon.textContent = '🌙';
            } else {
                document.body.classList.remove('dark-theme');
                localStorage.setItem('theme', 'light');
                themeIcon.textContent = '☀️';
            }    
        });
    </script>
</body>
</html>

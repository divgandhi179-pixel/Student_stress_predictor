<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Daily Check-in</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Theme Switcher -->
    <div class="theme-switch-wrapper">
        <label class="theme-switch" for="checkbox">
            <input type="checkbox" id="checkbox" />
            <div class="slider round"></div>
        </label>
        <span id="theme-icon">☀️</span>
    </div>

    <div class="container">
        <header style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border-color); padding-bottom: 20px; margin-bottom: 30px;">
            <div style="text-align: left;">
                <h1 style="margin-bottom: 5px; font-size: 1.8rem;">Daily Check-in 📅</h1>
                <p style="margin: 0;">Hi, <b>{{ user.username }}</b>. Log your daily activity!</p>
            </div>
            <div style="display: flex; gap: 10px; align-items: center;">
                <a href="{{ url_for('profile') }}" class="secondary-button">Edit Profile</a>
                <a href="{{ url_for('logout') }}" class="secondary-button text-danger" style="font-weight: 600;">Logout</a>
            </div>
        </header>

        <form id="predictionForm" style="max-width: 500px; margin: 0 auto;">
            <div class="form-section fade-in">
                <h3 style="text-align:center; font-size: 1.5rem; margin-bottom: 30px;">How did today go?</h3>
                
                <div class="input-group" style="margin-bottom: 30px;">
                    <label>⏱️ Active Study Time (Minutes)</label>
                    <input type="number" name="studytime" value="120" required>
                </div>

                <div class="input-group" style="margin-bottom: 30px;">
                    <label>📱 Social Media / Gaming Time (Minutes)</label>
                    <input type="number" name="smtime" value="60" required>
                </div>
            </div>

            <button type="submit" class="glow-button" id="submitBtn">
                <span>Analyze Today's Stress Level</span>
                <div class="loader" id="loader"></div>
            </button>
        </form>

        <!-- Result Section -->
        <div id="resultSection" class="result-glass hidden" style="margin-top: 30px;">
            <h2 id="stressTitle">Analytics Report Card</h2>
            <div style="margin-bottom: 1.5rem">
                <span id="stressCategory"></span>
            </div>
            
            <div class="gauge-container">
                 <div class="gauge-bar" id="gaugeBar"></div>
            </div>
            
            <div id="insightsBox" class="insights"></div>
            <button class="secondary-button" onclick="location.reload()" style="margin-top:10px; width:100%;">Log another day</button>
        </div>
    </div>

    <!-- The exact same JS logic from index.html -->
    <script>
        // Theme Switcher Logic
        const toggleSwitch = document.querySelector('.theme-switch input[type="checkbox"]');
        const themeIcon = document.getElementById('theme-icon');
        const currentTheme = localStorage.getItem('theme');

        if (currentTheme) {
            document.body.classList.add(currentTheme);
            if (currentTheme === 'dark-theme') {
                toggleSwitch.checked = true;
                themeIcon.textContent = '🌙';
            }
        }

        toggleSwitch.addEventListener('change', function(e) {
            if (e.target.checked) {
                document.body.classList.add('dark-theme');
                localStorage.setItem('theme', 'dark-theme');
                themeIcon.textContent = '🌙';
            } else {
                document.body.classList.remove('dark-theme');
                localStorage.setItem('theme', 'light');
                themeIcon.textContent = '☀️';
            }    
        });

        document.getElementById('predictionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const loader = document.getElementById('loader');
            const form = document.getElementById('predictionForm');
            const resultBox = document.getElementById('resultSection');
            
            btn.classList.add('loading');
            
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            
            // Send to backend
            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                form.style.display = 'none';
                btn.style.display = 'none';
                resultBox.classList.remove('hidden');
                resultBox.classList.add('fade-in');
                
                if (result.status === 'success') {
                    document.getElementById('stressTitle').innerText = 'Analytics Report Card';
                    let categoryNode = document.getElementById('stressCategory');
                    categoryNode.innerHTML = `Identified Stress Class: <span class="badge ${result.prediction.toLowerCase()}">${result.prediction}</span>`;
                    
                    let gauge = document.getElementById('gaugeBar');
                    let levels = {'Awful': 100, 'Bad': 75, 'Good': 40, 'Fabulous': 10};
                    let colors = {'Awful': '#ef4444', 'Bad': '#f59e0b', 'Good': '#10b981', 'Fabulous': '#3b82f6'};
                    let val = levels[result.prediction] || 50;
                    
                    gauge.style.width = '0%';
                    gauge.style.backgroundColor = colors[result.prediction] || '#ccc';
                    setTimeout(() => {
                        gauge.style.width = val + '%';
                    }, 300);

                    let insightsBox = document.getElementById('insightsBox');
                    insightsBox.innerHTML = '<h3>Personal Insights:</h3>';
                    result.insights.forEach(insight => {
                        insightsBox.innerHTML += `<p>${insight}</p>`;
                    });
                     
                } else {
                    document.getElementById('stressTitle').innerText = 'Error Generating Report';
                    document.getElementById('stressCategory').innerText = result.message;
                }
            } catch (error) {
                console.error(error);
                alert("An error occurred getting the prediction. Did you enter valid numbers?");
                btn.classList.remove('loading');
            }
        });
    </script>
</body>
</html>

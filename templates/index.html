<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Student Stress Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="container glass-panel">
        <header>
            <h1>AI Stress Level Predictor 🧠</h1>
            <p>Discover insights into your well-being based on academic and lifestyle habits.</p>
        </header>

        <form id="predictionForm">
            <!-- Section 1: Demographics -->
            <div class="form-section fade-in">
                <h3>Personal Demographics</h3>
                <div class="grid">
                    <div class="input-group">
                        <label>Gender</label>
                        <select name="gender" required>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Height (cm)</label>
                        <input type="number" name="height" value="170" required>
                    </div>
                    <div class="input-group">
                        <label>Weight (kg)</label>
                        <input type="number" name="weight" value="65" required>
                    </div>
                    <div class="input-group">
                        <label>Financial Status</label>
                        <select name="financial" required>
                            <option value="Fabulous">Fabulous</option>
                            <option value="good">Good</option>
                            <option value="Bad">Bad</option>
                            <option value="Awful">Awful</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Section 2: Academics -->
            <div class="form-section fade-in delay-1">
                <h3>Academic Details</h3>
                <div class="grid">
                    <div class="input-group">
                        <label>Department</label>
                        <select name="dep" required>
                            <option value="BCA">BCA</option>
                            <option value="Commerce">Commerce</option>
                            <option value="B.com Accounting and Finance ">B.com Accounting and Finance</option>
                            <option value="B.com ISM">B.com ISM</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>10th Grade Mark (%)</label>
                        <input type="number" name="mark10th" value="85" required>
                    </div>
                    <div class="input-group">
                        <label>12th Grade Mark (%)</label>
                        <input type="number" name="mark12th" value="80" required>
                    </div>
                    <div class="input-group">
                        <label>Current College Mark (%)</label>
                        <input type="number" name="collegemark" value="75" required>
                    </div>
                    <div class="input-group">
                        <label>Done Certification Course?</label>
                        <select name="certification" required>
                            <option value="No">No</option>
                            <option value="Yes">Yes</option>
                        </select>
                    </div>
                     <div class="input-group">
                        <label>Do you like your degree?</label>
                        <select name="likedegree" required>
                            <option value="Yes">Yes</option>
                            <option value="No">No</option>
                        </select>
                    </div>
                     <div class="input-group">
                        <label>Salary Expectation (₹)</label>
                        <input type="number" name="salexpect" value="50000" required>
                    </div>
                    <div class="input-group">
                        <label>Willing to Work in this Field? (%)</label>
                        <input type="number" name="career_willing" value="80" required>
                    </div>
                </div>
            </div>

            <!-- Section 3: Lifestyle -->
            <div class="form-section fade-in delay-2">
                <h3>Lifestyle & Habits</h3>
                <div class="grid">
                    <div class="input-group">
                        <label>Daily Study Time (mins)</label>
                        <input type="number" name="studytime" value="120" required>
                    </div>
                     <div class="input-group">
                        <label>Preferred Study Time</label>
                        <select name="prefertime" required>
                            <option value="Morning">Morning</option>
                            <option value="Afternoon">Afternoon</option>
                            <option value="Night">Night</option>
                            <option value="Anytime">Anytime</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Hobbies</label>
                        <select name="hobbies" required>
                            <option value="Sports">Sports</option>
                            <option value="Reading books">Reading books</option>
                            <option value="Video Games">Video Games</option>
                            <option value="Cinema">Cinema</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Daily Social Media (mins)</label>
                        <input type="number" name="smtime" value="60" required>
                    </div>
                    <div class="input-group">
                        <label>Daily Travel Time (mins)</label>
                        <input type="number" name="travel" value="30" required>
                    </div>
                    <div class="input-group">
                        <label>Part-time Job?</label>
                        <select name="parttime" required>
                            <option value="No">No</option>
                            <option value="Yes">Yes</option>
                        </select>
                    </div>
                </div>
            </div>

            <button type="submit" class="glow-button" id="submitBtn">
                <span>Predict Stress Level</span>
                <div class="loader" id="loader"></div>
            </button>
        </form>

        <!-- Result Section -->
        <div id="resultSection" class="result-glass hidden">
            <h2 id="stressTitle">Analyzing...</h2>
            <div class="gauge-container">
                 <div class="gauge-bar" id="gaugeBar"></div>
            </div>
            <p id="stressCategory"></p>
            <div id="insightsBox" class="insights"></div>
            <button class="reset-button" onclick="location.reload()">Reset</button>
        </div>
    </div>

    <script>
        document.getElementById('predictionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const loader = document.getElementById('loader');
            const form = document.getElementById('predictionForm');
            const resultBox = document.getElementById('resultSection');
            
            btn.classList.add('loading');
            
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            
            // Send to backend
            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                // Hide Form, Show Result
                form.style.display = 'none';
                btn.style.display = 'none';
                resultBox.classList.remove('hidden');
                resultBox.classList.add('fade-in');
                
                if (result.status === 'success') {
                    document.getElementById('stressTitle').innerText = 'Prediction Complete';
                    let categoryNode = document.getElementById('stressCategory');
                    categoryNode.innerHTML = `Predicted Stress Level: <strong class="badge ${result.prediction.toLowerCase()}">${result.prediction}</strong>`;
                    
                    // Gauge Animation
                    let gauge = document.getElementById('gaugeBar');
                    let levels = {'Awful': 100, 'Bad': 75, 'Good': 40, 'Fabulous': 10};
                    let colors = {'Awful': '#ff4757', 'Bad': '#ffa502', 'Good': '#2ed573', 'Fabulous': '#1e90ff'};
                    let val = levels[result.prediction] || 50;
                    
                    gauge.style.width = '0%';
                    gauge.style.backgroundColor = colors[result.prediction] || '#ccc';
                    setTimeout(() => {
                        gauge.style.width = val + '%';
                    }, 200);

                    // Insights
                    let insightsBox = document.getElementById('insightsBox');
                    insightsBox.innerHTML = '<h3>Personal Insights:</h3>';
                    result.insights.forEach(insight => {
                        insightsBox.innerHTML += `<p>• ${insight}</p>`;
                    });
                     
                } else {
                    document.getElementById('stressTitle').innerText = 'Error';
                    document.getElementById('stressCategory').innerText = result.message;
                }
            } catch (error) {
                console.error(error);
            }
        });
    </script>
</body>
</html>
